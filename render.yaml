services:
  # ── Node.js Backend ──────────────────────────────────────
  - type: web
    name: prajnaa-backend
    runtime: node
    region: singapore
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: AI_SERVICE_BASE_URL
        # Set to your prajnaa-ai-service Render URL e.g. https://prajnaa-ai-service.onrender.com
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: MAX_FILE_SIZE_MB
        value: 50
      - key: RATE_LIMIT_WINDOW_MS
        value: 60000
      - key: RATE_LIMIT_MAX
        value: 30

  # ── Python FastAPI AI Service ──────────────────────────────
  - type: web
    name: prajnaa-ai-service
    runtime: python
    region: singapore
    rootDir: ai-service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash

  # ── Vite/React Frontend (Static Site) ─────────────────────
  - type: web
    name: prajnaa-frontend
    runtime: static
    region: singapore
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: VITE_API_URL
        sync: false
