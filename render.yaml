services:
  - type: web
    name: dhristi-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install --omit=dev
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        value: https://drishtii.vercel.app  # replace with your Vercel URL
      - key: MAX_FILE_SIZE_MB
        value: 50
      - key: RATE_LIMIT_WINDOW_MS
        value: 60000
      - key: RATE_LIMIT_MAX
        value: 20
      - key: GROQ_API_KEY
        sync: false
